            </dd>

            <dt style="font-weight: bold; color: #f1f5f9; margin-top: 16px;">Q. 「キー調整」はどのように計算されていますか？</dt>
            <dd style="margin-left: 0; margin-top: 4px; margin-bottom: 12px; padding-left: 12px; border-left: 2px solid #334155;">
              原曲の最低音と最高音が、あなたの得意な音域（最低音〜最高音）にぴったり収まるような「移調量（キーのシフト量、±1〜±7）」を数学的に算出し、リアルタイムにシミュレートを再構成します。
            </dd>
          </dl>
